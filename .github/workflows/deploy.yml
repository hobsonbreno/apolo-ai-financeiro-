name: CI/CD Finance AI Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend (Static Analysis)
        run: |
          cd backend
          npm install
          npm run build

      - name: Build Frontend (Production Ready Check)
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm run build

      - name: Docker Compose Check
        run: docker compose config

