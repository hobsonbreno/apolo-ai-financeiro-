name: Build and Push Images

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # O nome da imagem será baseado no repositório (ex: ghcr.io/hobsonbreno/apolo-ai-financeiro-backend)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - component: backend
            image_suffix: backend
          - component: frontend
            image_suffix: frontend
          - component: ai-engine
            image_suffix: ai-engine
          - component: whatsapp-agent
            image_suffix: whatsapp-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image_suffix }}:latest
