apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: apolo-financeiro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
      - name: ai-engine
        image: ghcr.io/hobsonbreno/apolo-ai-financeiro--ai-engine:2e6a692
        ports:
        - containerPort: 8000
        env:
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: apolo-secrets
              key: openrouter-key
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: apolo-financeiro
spec:
  selector:
    app: ai-engine
  ports:
  - port: 8000
    targetPort: 8000
