apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: apolo-financeiro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-storage
          mountPath: /data/db
      volumes:
      - name: mongo-storage
        hostPath:
          path: /home/hobson007breno/data/apolo-mongodb
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: apolo-financeiro
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
